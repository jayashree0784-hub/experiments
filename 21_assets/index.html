<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>21 Blackjack</title>
    <script src="https://pygame-web.github.io/archives/0.9/pythons.js"></script>
    <style>
        body { 
            background-color: #146428; 
            color: #D4AF37; 
            margin: 0; 
            padding: 0;
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: 'Comic Sans MS', cursive; 
            overflow: hidden;
        }
        #status { 
            font-size: 24px; 
            text-align: center; 
            margin-bottom: 20px; 
        }
        #pygame {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 80%;
        }
    </style>
</head>
<body>
    <div id="status">Preparing the Deck...</div>
    <div id="pygame"></div>

    <script>
        async function start() {
            const statusElement = document.getElementById('status');
            const gameTarget = document.getElementById('pygame');
            
            console.log("Starting the shuffle...");

            try {
                // This connects to your game.zip file
                await Python.start("game.zip", {
                    archive: "game.zip",
                    entrypoint: "main.py",
                    type: "application/zip",
                    target: gameTarget
                });
                
                // Hide the 'Preparing' text once the game canvas loads
                statusElement.style.display = 'none';
                console.log("Deck is ready!");
            } catch (error) {
                statusElement.innerHTML = "Error loading 21 Blackjack. Make sure game.zip is in the 21_assets folder.";
                console.error("Pygame-web Loader Error:", error);
            }
        }

        // Initialize when the window is ready
        window.onload = start;
    </script>
</body>
</html>
