<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>21 Blackjack</title>
    <script src="https://pygame-web.github.io/archives/0.9/pythons.js"></script>
    <style>
        body { 
            background-color: #146428; 
            color: #D4AF37; 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: 'Comic Sans MS', cursive; 
        }
        #status { 
            font-size: 24px; 
            text-align: center; 
            margin-bottom: 20px; 
        }
        /* This ensures the game canvas stays centered */
        #pygame {
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>
    <div id="status">Preparing the Deck...</div>
    <div id="pygame"></div>

    <script>
        async function start() {
            const statusElement = document.getElementById('status');
            const gameTarget = document.getElementById('pygame');
            
            try {
                // Changed game.apk to game.zip
                // Added entrypoint to tell the loader to run main.py
                await Python.start("game.zip", {
                    archive: "game.zip",
                    entrypoint: "main.py",
                    type: "application/octet-stream",
                    target: gameTarget
                });
                
                // Hide the loading message once the game starts
                statusElement.style.display = 'none';
            } catch (error) {
                statusElement.innerHTML = "Error loading 21 Blackjack. Check if game.zip is in the 21_assets folder.";
                console.error("Pygame-web Loader Error:", error);
            }
        }

        // Run the start function when the window finishes loading
        window.onload = start;
    </script>
</body>
</html>
